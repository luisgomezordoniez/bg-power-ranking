<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabletop Power Rankings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1812; --ink2: #5a5650; --ink3: #9a9590;
    --paper: #f5f2ec; --paper2: #edeae2;
    --accent: #c84b2f; --accent2: #e8a020; --green: #2a7a4a;
    --border: rgba(26,24,18,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'DM Sans', sans-serif; }

  header { border-bottom: 1px solid var(--border); padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 1.2rem; }
  .logo em { font-style: italic; color: var(--accent); }
  .nav-links { display: flex; gap: 1.5rem; }
  .nav-links a { font-size: 13px; color: var(--ink2); text-decoration: none; }
  .nav-links a:hover { color: var(--ink); }

  .hero { padding: 3rem 2rem 2rem; max-width: 900px; margin: 0 auto; }
  .hero h1 { font-family: 'DM Serif Display', serif; font-size: clamp(2.2rem, 5vw, 3.5rem); line-height: 1.05; }
  .hero h1 em { font-style: italic; color: var(--accent); }
  .hero-meta { display: flex; align-items: center; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
  .month-chip { font-size: 13px; background: var(--paper2); padding: 5px 14px; border-radius: 20px; color: var(--ink2); }
  .voter-chip { font-size: 13px; color: var(--ink3); }

  .month-nav { display: flex; align-items: center; gap: 8px; }
  .month-nav button { background: none; border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; color: var(--ink2); }
  .month-nav button:hover { background: var(--paper2); }
  .month-nav button:disabled { opacity: 0.3; cursor: default; }

  .content { max-width: 900px; margin: 0 auto; padding: 1.5rem 2rem 4rem; }

  .tabs { display: flex; gap: 4px; margin-bottom: 2rem; border-bottom: 1px solid var(--border); }
  .tab { padding: 10px 20px; font-size: 14px; cursor: pointer; background: none; border: none; color: var(--ink2); font-family: 'DM Sans', sans-serif; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .tab.active { color: var(--ink); border-bottom-color: var(--accent); font-weight: 500; }
  .tab:hover:not(.active) { color: var(--ink); }

  .panel { display: none; }
  .panel.active { display: block; }

  .ranking-grid { display: grid; gap: 6px; }
  .rank-row { display: grid; grid-template-columns: 44px 1fr 120px 52px; align-items: center; gap: 0; background: #fff; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: border-color 0.15s; }
  .rank-row:hover { border-color: rgba(26,24,18,0.25); }
  .rank-row.top1 { border-color: var(--accent2); }
  .rank-cell { padding: 14px 16px; }
  .rank-num { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--ink3); text-align: center; padding: 14px 0; }
  .rank-row.top1 .rank-num { color: var(--accent2); }
  .rank-row.top2 .rank-num, .rank-row.top3 .rank-num { color: var(--ink2); }
  .game-name { font-size: 15px; font-weight: 500; color: var(--ink); }
  .game-id { font-size: 11px; color: var(--ink3); margin-top: 2px; }
  .score-cell { padding: 14px 16px 14px 0; }
  .score-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .score-bar { height: 3px; flex: 1; background: var(--paper2); border-radius: 2px; }
  .score-fill { height: 100%; border-radius: 2px; }
  .score-val { font-size: 12px; color: var(--ink3); min-width: 36px; text-align: right; }
  .move-cell { text-align: center; font-size: 12px; font-weight: 500; padding: 14px 12px; }
  .move-up { color: var(--green); }
  .move-down { color: var(--accent); }
  .move-new { color: #1565c0; font-size: 10px; letter-spacing:0.04em; }
  .move-same { color: var(--ink3); }

  .hall-grid { display: grid; gap: 6px; }
  .hall-row { display: flex; align-items: center; gap: 16px; background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .hall-num { font-size: 20px; }
  .hall-name { font-size: 15px; font-weight: 500; flex: 1; }
  .hall-count { font-size: 12px; color: var(--ink3); }
  .hall-badge { font-size: 10px; padding: 3px 8px; border-radius: 10px; background: #fdecea; color: #b71c1c; letter-spacing: 0.04em; text-transform: uppercase; }

  .empty-state { padding: 3rem 0; text-align: center; color: var(--ink3); font-size: 14px; }
  .loading { padding: 3rem 0; text-align: center; color: var(--ink3); font-size: 14px; }

  .lang-toggle { display: flex; gap: 6px; }
  .lang-btn { font-size: 12px; padding: 3px 10px; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; background: transparent; color: var(--ink2); font-family: 'DM Sans', sans-serif; }
  .lang-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  @media (max-width: 600px) {
    header { padding: 1rem; }
    .hero { padding: 2rem 1rem 1.5rem; }
    .content { padding: 1rem 1rem 3rem; }
    .rank-row { grid-template-columns: 36px 1fr 80px 44px; }
    .rank-cell, .score-cell, .move-cell { padding: 12px 8px; }
    .rank-num { font-size: 1.1rem; }
    .game-name { font-size: 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Tabletop <em>Power Rankings</em></div>
  <div style="display:flex;align-items:center;gap:1.5rem">
    <div class="nav-links">
      <a href="vote.html" id="nav-vote">Votar</a>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('es')">ES</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
  </div>
</header>

<div class="hero">
  <h1 id="hero-title">Rankings de<br><em>mesa del mes</em></h1>
  <div class="hero-meta">
    <div class="month-nav">
      <button id="prev-btn" onclick="prevMonth()">←</button>
      <span class="month-chip" id="month-chip">Cargando...</span>
      <button id="next-btn" onclick="nextMonth()">→</button>
    </div>
    <span class="voter-chip" id="voter-chip"></span>
  </div>
</div>

<div class="content">
  <div id="main-content">
    <div class="loading" id="loading-msg">Cargando rankings...</div>
  </div>
</div>

<script>
const API_URL = "YOUR_APPS_SCRIPT_WEB_APP_URL";
let lang = "es";
let allMonths = [];
let currentIdx = 0;

const T = {
  es: {
    hero_title: ["Rankings de", "mesa del mes"],
    nav_vote: "Votar",
    tabs: ["🔥 Novedades", "❤️ Favoritos", "😬 Vergüenza", "🏆 Hall of Shame"],
    move_new: "nuevo",
    voters: (n) => `${n} votante${n!==1?'s':''}`,
    loading: "Cargando rankings...",
    empty: "No hay datos publicados todavía.",
    hall_empty: "El Hall of Shame está vacío... por ahora.",
    hall_months: (n) => `${n} meses de vergüenza`,
    score_label: "puntuación",
    hot_desc: "Juegos más jugados este mes",
    fav_desc: "Los favoritos eternos de la comunidad",
    shame_desc: "Los que nadie quiere volver a jugar",
  },
  en: {
    hero_title: ["Monthly tabletop", "power rankings"],
    nav_vote: "Vote",
    tabs: ["🔥 Hotness", "❤️ Favorites", "😬 Shame", "🏆 Hall of Shame"],
    move_new: "new",
    voters: (n) => `${n} voter${n!==1?'s':''}`,
    loading: "Loading rankings...",
    empty: "No published data yet.",
    hall_empty: "The Hall of Shame is empty... for now.",
    hall_months: (n) => `${n} months of shame`,
    score_label: "score",
    hot_desc: "Most played new games this month",
    fav_desc: "The community's enduring favorites",
    shame_desc: "Games nobody wants to play again",
  }
};

function tr(key, ...args) {
  const v = T[lang][key];
  return typeof v === 'function' ? v(...args) : v;
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&l==='es')||(i===1&&l==='en')));
  updateStaticTexts();
  if (allMonths.length) renderMonth(currentIdx);
}

function updateStaticTexts() {
  const ht = tr('hero_title');
  document.getElementById('hero-title').innerHTML = ht[0]+'<br><em>'+ht[1]+'</em>';
  document.getElementById('nav-vote').textContent = tr('nav_vote');
}

function prevMonth() { if (currentIdx > 0) { currentIdx--; renderMonth(currentIdx); } }
function nextMonth() { if (currentIdx < allMonths.length-1) { currentIdx++; renderMonth(currentIdx); } }

function renderMonth(idx) {
  const data = allMonths[idx];
  document.getElementById('month-chip').textContent = data.month;
  document.getElementById('voter-chip').textContent = tr('voters', data.total);
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === allMonths.length - 1;

  const tabs = tr('tabs');
  document.getElementById('main-content').innerHTML = `
    <div class="tabs">
      ${tabs.map((t,i) => `<button class="tab${i===0?' active':''}" onclick="switchTab(${i})">${t}</button>`).join('')}
    </div>
    <div id="panel-0" class="panel active">${renderRanking(data.hotness, '#c84b2f')}</div>
    <div id="panel-1" class="panel">${renderRanking(data.favorites, '#2a7a4a')}</div>
    <div id="panel-2" class="panel">${renderShame(data.shame)}</div>
    <div id="panel-3" class="panel">${renderHall(data.hall)}</div>
  `;
}

function switchTab(idx) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.panel').forEach((p,i) => p.classList.toggle('active', i===idx));
}

function renderRanking(items, color) {
  if (!items || !items.length) return `<div class="empty-state">${tr('empty')}</div>`;
  const max = items[0].score;
  return `<div class="ranking-grid">${items.map((item,i) => {
    const rank = i+1;
    const pct = Math.round((item.score/max)*100);
    const moveHtml = moveLabel(item.move);
    return `<div class="rank-row${rank<=3?' top'+rank:''}">
      <div class="rank-num">${rank}</div>
      <div class="rank-cell">
        <div class="game-name">${item.name}</div>
        ${item.id ? `<div class="game-id">BGG #${item.id}</div>` : ''}
      </div>
      <div class="score-cell">
        <div class="score-bar-wrap">
          <div class="score-bar"><div class="score-fill" style="width:${pct}%;background:${color}"></div></div>
          <div class="score-val">${item.score.toFixed(2)}</div>
        </div>
      </div>
      <div class="move-cell">${moveHtml}</div>
    </div>`;
  }).join('')}</div>`;
}

function renderShame(items) {
  if (!items || !items.length) return `<div class="empty-state">${tr('empty')}</div>`;
  const max = items[0].score;
  return `<div class="ranking-grid">${items.map((item,i) => {
    const pct = Math.round((item.score/max)*100);
    return `<div class="rank-row">
      <div class="rank-num">${i+1}</div>
      <div class="rank-cell"><div class="game-name">${item.name}</div></div>
      <div class="score-cell">
        <div class="score-bar-wrap">
          <div class="score-bar"><div class="score-fill" style="width:${pct}%;background:#c84b2f"></div></div>
          <div class="score-val">${item.score.toFixed(2)}</div>
        </div>
      </div>
      <div class="move-cell">${moveLabel(item.move)}</div>
    </div>`;
  }).join('')}</div>`;
}

function renderHall(hall) {
  if (!hall || !hall.length) return `<div class="empty-state">${tr('hall_empty')}</div>`;
  return `<div class="hall-grid">${hall.map((item,i) => `
    <div class="hall-row">
      <div class="hall-num">${['🥇','🥈','🥉'][i]||'💀'}</div>
      <div class="hall-name">${item.name}</div>
      <div class="hall-count">${tr('hall_months', item.totalMonths)}</div>
      <div class="hall-badge">inducted</div>
    </div>`).join('')}</div>`;
}

function moveLabel(move) {
  if (!move || move === 'new') return `<span class="move-new">${tr('move_new')}</span>`;
  if (move === '0') return `<span class="move-same">—</span>`;
  const n = parseInt(move);
  if (n > 0) return `<span class="move-up">+${n}</span>`;
  if (n < 0) return `<span class="move-down">${n}</span>`;
  return `<span class="move-same">—</span>`;
}

async function init() {
  updateStaticTexts();
  try {
    const res = await fetch(API_URL + '?action=published');
    const data = await res.json();
    allMonths = (data.months || []).reverse();
    if (!allMonths.length) {
      document.getElementById('main-content').innerHTML = `<div class="empty-state">${tr('empty')}</div>`;
      return;
    }
    currentIdx = 0;
    renderMonth(0);
  } catch(e) {
    document.getElementById('main-content').innerHTML = `<div class="empty-state">${tr('empty')}</div>`;
  }
}

init();
</script>
</body>
</html>
